<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR 16:9 Hologram - Autoplay No Music</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
        /**
         * SHADER CHROMAKEY PROFESSIONALE
         */
        AFRAME.registerShader('chromakey-green', {
            schema: {
                src: {type: 'map'},
                color: {type: 'color', default: {r: 0, g: 1, b: 0}},
                threshold: {type: 'number', default: 0.4}
            },
            init: function(data) {
                this.material = new THREE.ShaderMaterial({
                    uniforms: {
                        tex: {value: data.src},
                        color: {value: new THREE.Color(data.color)},
                        threshold: {value: data.threshold}
                    },
                    vertexShader: `
                        varying vec2 vUv;
                        void main() {
                            vUv = uv;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: `
                        uniform sampler2D tex;
                        uniform vec3 color;
                        uniform float threshold;
                        varying vec2 vUv;
                        void main() {
                            vec4 texColor = texture2D(tex, vUv);
                            float dist = distance(texColor.rgb, color);
                            if (dist < threshold) {
                                discard;
                            }
                            gl_FragColor = texColor;
                        }
                    `,
                    transparent: true
                });
            },
            update: function(data) {
                this.material.uniforms.tex.value = data.src;
                this.material.uniforms.color.value = new THREE.Color(data.color);
                this.material.uniforms.threshold.value = data.threshold;
            }
        });
    </script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #arjs-video { object-fit: cover !important; width: 100vw !important; height: 100vh !important; }
        #ar-overlay {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(0,0,0,0.8); color: white;
            padding: 15px 25px; border-radius: 30px; font-family: sans-serif;
            text-align: center; pointer-events: none; border: 1px solid #444;
        }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">

    <div id="ar-overlay">Inquadra Barcode 2 <br><strong>Installazione Virtuale Attiva</strong></div>

    <a-scene embedded vr-mode-ui="enabled: false" 
             arjs="sourceType: webcam; 
                   debugUIEnabled: false; 
                   detectionMode: mono_and_matrix; 
                   matrixCodeType: 3x3;
                   sourceWidth: 1280; sourceHeight: 720;">

        <a-assets>
            <video id="vid" 
                   src="vd1-loop.mp4" 
                   loop="true" 
                   autoplay="true" 
                   muted="true" 
                   playsinline 
                   webkit-playsinline
                   crossorigin="anonymous">
            </video>
        </a-assets>

        <a-marker type="barcode" value="2">
            <a-plane 
                src="#vid"
                position="0 1 0" 
                rotation="0 90 0" 
                width="2.0" 
                height="1.125" 
                material="shader: chromakey-green; src: #vid; color: 0 1 0; threshold: 0.45; side: double;">
            </a-plane>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const video = document.querySelector('#vid');
        const overlay = document.querySelector('#ar-overlay');

        // Fa sparire l'overlay al primo tocco e assicura il play
        window.addEventListener('click', function() {
            video.play();
            overlay.style.opacity = '0.5'; // Rende l'overlay meno invasivo dopo l'interazione
        }, { once: true });

        // Gestione Play/Pause automatica basata sulla visibilità del marker
        const marker = document.querySelector('a-marker');
        
        marker.addEventListener('markerFound', function() {
            video.play();
        });

        marker.addEventListener('markerLost', function() {
            video.pause();
        });
    </script>

</body>
</html>

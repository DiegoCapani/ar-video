<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Hologram - Full Autoplay</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <script src="https://unpkg.com/aframe-chromakey-shader@1.1.4/dist/aframe-chromakey-shader.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        
        /* Correzione per il video della webcam: evita lo zoom eccessivo */
        #arjs-video {
            object-fit: cover !important;
            width: 100vw !important;
            height: 100vh !important;
        }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">

    <a-scene embedded 
             vr-mode-ui="enabled: false"
             arjs="sourceType: webcam; debugUIEnabled: false; sourceWidth:1280; sourceHeight:720; displayWidth:1280; displayHeight:720;">

        <a-assets>
            <video id="ologrammaVideo" 
                   src="vd1-loop.mp4" 
                   preload="auto" 
                   loop="true" 
                   autoplay 
                   muted 
                   playsinline 
                   webkit-playsinline 
                   crossorigin="anonymous">
            </video>
        </a-assets>

        <a-marker preset="hiro">
            
            <a-plane 
                src="#ologrammaVideo" 
                position="0 0 0" 
                rotation="0 90 0" 
                width="1.2" 
                height="2.1" 
                material="shader: flat; blending: additive; transparent: true; side: double; opacity: 1;">
            </a-plane>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        window.addEventListener('load', function () {
            var video = document.querySelector('#ologrammaVideo');
            
            // Tenta l'avvio immediato. Funzionerà perché il video è MUTED.
            video.play().catch(function(error) {
                console.log("Autoplay automatico fallito. Riprovo al caricamento della scena.");
            });

            // Se il primo tentativo fallisce, riprova quando AR.js è pronto
            document.querySelector('a-scene').addEventListener('loaded', function () {
                video.play().catch(function(error) {
                    console.error("Autoplay bloccato definitivamente. L'utente deve interagire.");
                });
            });
        });
    </script>

</body>
</html>

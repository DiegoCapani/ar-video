<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Hologram - ChromaKey Custom</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
        /**
         * PIANO B: SHADER CHROMAKEY NATIVO
         * Questo script crea un nuovo tipo di materiale 'chromakey-native'
         * che analizza i pixel e rimuove il colore specificato (nero).
         */
        AFRAME.registerShader('chromakey-native', {
            schema: {
                src: {type: 'map'},
                color: {type: 'color', default: {r: 0, g: 0, b: 0}},
                threshold: {type: 'number', default: 0.1}
            },
            init: function(data) {
                this.material = new THREE.ShaderMaterial({
                    uniforms: {
                        tex: {value: data.src},
                        color: {value: new THREE.Color(data.color)},
                        threshold: {value: data.threshold}
                    },
                    vertexShader: `
                        varying vec2 vUv;
                        void main() {
                            vUv = uv;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: `
                        uniform sampler2D tex;
                        uniform vec3 color;
                        uniform float threshold;
                        varying vec2 vUv;
                        void main() {
                            vec4 texColor = texture2D(tex, vUv);
                            // Calcola la distanza tra il colore del pixel e il colore da rimuovere
                            float dist = distance(texColor.rgb, color);
                            if (dist < threshold) {
                                discard; // Rende il pixel trasparente
                            }
                            gl_FragColor = texColor;
                        }
                    `,
                    transparent: true
                });
            },
            update: function(data) {
                this.material.uniforms.tex.value = data.src;
                this.material.uniforms.color.value = new THREE.Color(data.color);
                this.material.uniforms.threshold.value = data.threshold;
            }
        });
    </script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #arjs-video { object-fit: cover !important; width: 100vw !important; height: 100vh !important; }
        #ar-overlay {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(0,0,0,0.8); color: white;
            padding: 15px 25px; border-radius: 30px; font-family: sans-serif;
            text-align: center; pointer-events: none;
        }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">

    <div id="ar-overlay">Inquadra Barcode 2 <br><strong>TOCCA PER L'AUDIO</strong></div>

    <a-scene embedded vr-mode-ui="enabled: false" 
             arjs="sourceType: webcam; 
                   debugUIEnabled: false; 
                   detectionMode: mono_and_matrix; 
                   matrixCodeType: 3x3;
                   sourceWidth:1280; sourceHeight:720;">

        <a-assets>
            <video id="vid" src="vd1-loop.mp4" loop="true" autoplay muted playsinline crossorigin="anonymous"></video>
            <audio id="musica" src="musica.mp3" loop="true" crossorigin="anonymous"></audio>
        </a-assets>

        <a-marker type="barcode" value="2">
            <a-plane 
                position="0 1 0" 
                rotation="0 90 0" 
                width="1.5" 
                height="2.5" 
                material="shader: chromakey-native; src: #vid; color: 0 0 0; threshold: 0.3; side: double;">
            </a-plane>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const video = document.querySelector('#vid');
        const audio = document.querySelector('#musica');
        const overlay = document.querySelector('#ar-overlay');

        // Sblocco Audio e Video al tocco
        window.addEventListener('click', function() {
            audio.play().catch(e => console.log("Errore Audio:", e));
            video.play();
            overlay.style.display = 'none';
        }, { once: true });

        // Forza il play al rilevamento
        document.querySelector('a-marker').addEventListener('markerFound', function() {
            video.play();
        });
    </script>

</body>
</html>

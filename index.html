<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ologramma AR.js - by Diego Capani</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden;">

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">

        <a-assets>
            <video id="ologrammaVideo" 
                   src="vd1-loop.mp4" 
                   preload="auto" 
                   loop="true" 
                   autoplay 
                   muted 
                   playsinline 
                   webkit-playsinline 
                   crossorigin="anonymous">
            </video>
        </a-assets>

        <a-marker preset="hiro">
            <a-plane 
                src="#ologrammaVideo" 
                position="0 0.8 0" 
                rotation="0 0 0" 
                width="1.2" 
                height="2" 
                material="shader: flat; blending: additive; transparent: true; side: double; opacity: 1;">
            </a-plane>
        </a-marker>

        <a-entity camera></a-entity>

    </a-scene>

    <script>
        // Alcuni browser richiedono un'interazione utente. Questo script avvia il video al primo tocco.
        document.body.addEventListener('click', function() {
            var v = document.querySelector('#ologrammaVideo');
            if (v.paused) {
                v.play().catch(function(error) {
                    console.error("Errore nell'avvio del video dopo il click:", error);
                });
            }
        }, { once: true }); // Esegue il listener solo una volta

        // Tenta l'autoplay anche senza click, utile per alcuni dispositivi
        window.addEventListener('load', function () {
            var v = document.querySelector('#ologrammaVideo');
            v.play().catch(function(error) {
                console.log("Autoplay automatico bloccato dai criteri del browser. L'utente deve interagire (toccare lo schermo).");
            });
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Hologram - Photo Capture</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        
        /* Ottimizzazione video webcam */
        #arjs-video {
            object-fit: cover !important;
            width: 100vw !important;
            height: 100vh !important;
        }

        /* Pulsante Scatta Foto */
        #btn-foto {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            border: 5px solid rgba(0,0,0,0.3);
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            z-index: 9999;
            cursor: pointer;
        }
        
        #btn-foto:active {
            background: #ff0000; /* Feedback visivo al tocco */
            transform: translateX(-50%) scale(0.9);
        }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">

    <div id="btn-foto" title="Scatta Foto"></div>

    <a-scene embedded 
             vr-mode-ui="enabled: false"
             renderer="preserveDrawingBuffer: true; alpha: true;"
             arjs="sourceType: webcam; 
                   detectionMode: mono_and_matrix; 
                   matrixCodeType: 3x3; 
                   debugUIEnabled: false; 
                   sourceWidth:1280; sourceHeight:720; 
                   displayWidth:1280; displayHeight:720;">

        <a-assets>
            <video id="ologrammaVideo" 
                   src="vd1-loop.mp4" 
                   preload="auto" 
                   loop="true" 
                   autoplay="true" 
                   muted="true" 
                   playsinline 
                   webkit-playsinline 
                   crossorigin="anonymous">
            </video>
        </a-assets>

        <a-marker type="barcode" value="2">
            <a-plane 
                src="#ologrammaVideo" 
                position="0 1 0" 
                rotation="0 90 0" 
                width="1.2" 
                height="2.1" 
                material="shader: flat; blending: additive; transparent: true; side: double; opacity: 1;">
            </a-plane>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // --- GESTIONE VIDEO ---
        window.addEventListener('load', function () {
            var video = document.querySelector('#ologrammaVideo');
            
            video.play().catch(function(error) {
                console.log("Autoplay in attesa di interazione...");
            });

            var marker = document.querySelector('a-marker');
            marker.addEventListener('markerFound', function() {
                video.play();
            });
        });

        // --- GESTIONE FOTO ---
        document.querySelector('#btn-foto').addEventListener('click', function() {
            const scene = document.querySelector('a-scene');
            const videoWebcam = document.querySelector('#arjs-video');
            
            // Creiamo un canvas temporaneo per unire webcam e 3D
            const canvas = document.createElement('canvas');
            canvas.width = videoWebcam.videoWidth;
            canvas.height = videoWebcam.videoHeight;
            const ctx = canvas.getContext('2d');

            // 1. Disegna il frame attuale della webcam
            ctx.drawImage(videoWebcam, 0, 0, canvas.width, canvas.height);

            // 2. Disegna sopra il contenuto 3D (A-Frame)
            const aframeCanvas = scene.canvas;
            ctx.drawImage(aframeCanvas, 0, 0, canvas.width, canvas.height);

            // 3. Download dell'immagine
            const dataURL = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = 'ar-capture-' + Date.now() + '.png';
            link.href = dataURL;
            link.click();
        });
    </script>

</body>
</html>

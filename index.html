<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }

#scatta {
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
width:85px;
height:85px;
border-radius:50%;
background:white;
border:6px solid black;
z-index:999;
}

#countdown{
position:fixed;
top:40%;
width:100%;
text-align:center;
font-size:90px;
color:white;
text-shadow:0 0 20px black;
z-index:1000;
display:none;
}
</style>
</head>

<body>

<div id="scatta"></div>
<div id="countdown"></div>

<a-scene
embedded
vr-mode-ui="enabled:false"
renderer="logarithmicDepthBuffer:true; alpha:true; preserveDrawingBuffer:true;"
arjs="sourceType:webcam; trackingMethod:best; debugUIEnabled:false;">

<a-assets>
<a-asset-item id="artista" src="./luzzetti.glb"></a-asset-item>
</a-assets>

<a-marker preset="hiro"
smooth="true"
smoothCount="10"
smoothTolerance="0.01"
smoothThreshold="5">

<a-light type="ambient" intensity="1.3"></a-light>
<a-light type="directional" position="1 3 2" intensity="1"></a-light>

<a-entity id="wrapper" rotation="-90 0 0"> 
        <a-entity
            id="personaggio"
            gltf-model="#artista"
            animation-mixer
            position="0 0 0"
            scale="25 25 25" 
            look-at="#main-camera">
        </a-entity>
    </a-entity>

</a-marker>

<a-entity id="main-camera" camera></a-entity>

</a-scene>

<script>

const btn = document.getElementById("scatta");
const countdownEl = document.getElementById("countdown");

btn.onclick = async () => {

for(let i=3;i>0;i--){
countdownEl.style.display="block";
countdownEl.innerText=i;
await new Promise(r=>setTimeout(r,1000));
}
countdownEl.style.display="none";

scattaFoto();
};

function scattaFoto(){

const scene = document.querySelector("a-scene");
const canvasAR = scene.canvas;
const video = document.querySelector("#arjs-video") || document.querySelector("video");

const outW = 1080;
const outH = 1920;

const canvasFinale = document.createElement("canvas");
canvasFinale.width = outW;
canvasFinale.height = outH;

const ctx = canvasFinale.getContext("2d");

// --- crop webcam ---
const vW = video.videoWidth;
const vH = video.videoHeight;
const targetRatio = outW/outH;
const videoRatio = vW/vH;

let sx,sy,sw,sh;

if(videoRatio>targetRatio){
sw=vH*targetRatio;
sh=vH;
sx=(vW-sw)/2;
sy=0;
}else{
sw=vW;
sh=vW/targetRatio;
sx=0;
sy=(vH-sh)/2;
}

ctx.drawImage(video,sx,sy,sw,sh,0,0,outW,outH);

// forza render AR
scene.renderer.render(scene.object3D, scene.camera);

// --- crop AR ---
const cW = canvasAR.width;
const cH = canvasAR.height;
const canvasRatio = cW/cH;

let cx,cy,cw,ch;

if(canvasRatio>targetRatio){
cw=cH*targetRatio;
ch=cH;
cx=(cW-cw)/2;
cy=0;
}else{
cw=cW;
ch=cW/targetRatio;
cx=0;
cy=(cH-ch)/2;
}

ctx.drawImage(canvasAR,cx,cy,cw,ch,0,0,outW,outH);

// download
const link=document.createElement("a");
link.download="Selfie_AR_"+Date.now()+".png";
link.href=canvasFinale.toDataURL("image/png");
link.click();

}

</script>

</body>
</html>

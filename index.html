<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR PNG Capture - Diego Capani</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        
        /* Pulsante Scatto Foto UI */
        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }

        .btn-capture {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: white;
            border: 5px solid rgba(0,0,0,0.2);
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        .btn-capture:active {
            transform: scale(0.9);
            background: #eee;
        }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">

    <div id="controls">
        <div class="btn-capture" id="shutter"></div>
    </div>

    <a-scene 
        embedded 
        vr-mode-ui="enabled: false"
        renderer="preserveDrawingBuffer: true; alpha: true;"
        arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false;">

        <a-assets>
            <img id="mio-png" src="man1.png" crossorigin="anonymous">
        </a-assets>

        <a-marker type="barcode" value="1">
            <a-image 
                src="#mio-png" 
                scale="8 8 8" 
                position="0 0.1 0" 
                rotation="0 0 0"
                material="transparent: true; alphaTest: 0.5; shader: flat; side: double;">
            </a-image>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const shutter = document.getElementById('shutter');
        
        shutter.addEventListener('click', function() {
            const scene = document.querySelector('a-scene');
            const video = document.querySelector('#arjs-video');
            
            // Creiamo un canvas per unire Webcam + PNG
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');

            // 1. Disegna il frame della Webcam
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 2. Disegna sopra il contenuto di A-Frame (il tuo PNG nel mondo AR)
            // Nota: Usiamo il canvas generato da A-Frame
            ctx.drawImage(scene.canvas, 0, 0, canvas.width, canvas.height);

            // 3. Genera il download dell'immagine
            const dataURL = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = `AR_Snapshot_${Date.now()}.png`;
            link.href = dataURL;
            link.click();
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <video id="ologramma" src="vd1-loop.mp4" preload="auto" loop="true" response-type="arraybuffer" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        </a-assets>

        <a-marker preset="hiro">
            <a-plane 
                src="#ologramma" 
                position="0 0.8 0" 
                rotation="-90 0 0" 
                width="1.2" 
                height="2" 
                material="shader: flat; blending: additive; transparent: true; side: double; opacity: 1;">
            </a-plane>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // I browser mobile bloccano l'audio/video senza un'interazione utente
        window.addEventListener('click', function () {
            var v = document.querySelector('#ologramma');
            v.play();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Selfie - Look-at Stabilizzato</title>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin:0; overflow:hidden; font-family:sans-serif; }
        #scatta {
            position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
            width:85px; height:85px; border-radius:50%; background:white;
            border:6px solid black; z-index:999; cursor: pointer;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }
        #countdown {
            position:fixed; top:40%; width:100%; text-align:center;
            font-size:120px; color:white; text-shadow:0 0 20px black;
            font-weight: bold; z-index:1000; display:none; pointer-events: none;
        }

        /* STILE PER IL FLASH */
        #flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; z-index: 1001; pointer-events: none;
        }
        .flash-active {
            animation: flashAnim 0.3s ease-out;
        }
        @keyframes flashAnim {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>

<body>

<div id="flash"></div>
<div id="scatta"></div>
<div id="countdown"></div>

<audio id="audioScatto" src="assets/shutter.mp3" preload="auto"></audio>

<a-scene
    embedded
    vr-mode-ui="enabled:false"
    renderer="logarithmicDepthBuffer:true; alpha:true; preserveDrawingBuffer:true; antialias: true;"
    arjs="sourceType:webcam; trackingMethod:best; debugUIEnabled:false; canvasWidth:1280; canvasHeight:720;">

    <a-assets>
        <img id="posa1" src="assets/luzzetti1.png" crossorigin="anonymous">
        <img id="posa2" src="assets/luzzetti2.png" crossorigin="anonymous">
        <img id="posa3" src="assets/luzzetti3.png" crossorigin="anonymous">
        <img id="posa4" src="assets/luzzetti4.png" crossorigin="anonymous">
        <img id="posa5" src="assets/luzzetti5.png" crossorigin="anonymous">
        <img id="posa6" src="assets/luzzetti6.png" crossorigin="anonymous">
    </a-assets>

    <a-marker preset="hiro" keep-visible id="marker">
        <a-entity id="wrapper" rotation="0 0 0">
<a-plane
    id="personaggio"
    src="#posa1"
    position="0 0.1 0" 
    width="17" 
    height="17"
    transparent="true"
    alpha-test="0.5"
    shader="flat"
    vertical-look-at>
</a-plane>
        </a-entity>
    </a-marker>

    <a-entity id="main-camera" camera="far: 10000; near: 0.1;"></a-entity>

</a-scene>

<script>
   
    // --- 1. LOOK-AT VERTICALE ---
   AFRAME.registerComponent('vertical-look-at', {
    tick: function () {
        const target = document.querySelector('#main-camera');
        if (!target) return;

        // 1. Otteniamo la posizione della camera e dell'oggetto nel mondo
        const targetPos = new THREE.Vector3();
        const myPos = new THREE.Vector3();
        target.object3D.getWorldPosition(targetPos);
        this.el.object3D.getWorldPosition(myPos);

        // 2. Calcoliamo la direzione verso la camera
        const direction = new THREE.Vector3().subVectors(targetPos, myPos);

        // 3. IMPORTANTISSIMO: Annulliamo la componente verticale (Y) della direzione
        // Questo "costringe" il calcolo a ignorare se il telefono è alto, basso o inclinato
        direction.y = 0;

        // 4. Creiamo la rotazione finale
        // Usiamo un oggetto di supporto per non mandare in tilt il sistema AR
        const helper = new THREE.Object3D();
        helper.lookAt(direction);

        // 5. Applichiamo SOLO la rotazione Y al personaggio
        // Lasciamo X e Z a 0 (niente effetto volante, niente taglio)
        this.el.object3D.rotation.set(0, helper.rotation.y, 0);
    }
});
    // --- 2. KEEP VISIBLE ---
    AFRAME.registerComponent('keep-visible', {
        init: function () {
            let entity = this.el.querySelector('#personaggio');
            this.el.addEventListener('markerFound', () => { entity.setAttribute('visible', true); });
            this.el.addEventListener('markerLost', () => { entity.setAttribute('visible', true); });
        }
    });

    // --- 3. CAMBIO POSA RANDOM ---
    function cambiaPosaRandom() {
        const personaggio = document.querySelector("#personaggio");
        const pose = ["#posa1", "#posa2", "#posa3", "#posa4", "#posa5", "#posa6"];
        const scelta = pose[Math.floor(Math.random() * pose.length)];
        personaggio.setAttribute("material", "src", scelta);
    }

    // --- 4. LOGICA PULSANTE, FLASH E SUONO ---
    const btn = document.getElementById("scatta");
    const countdownEl = document.getElementById("countdown");
    const flashEl = document.getElementById("flash");
    const audioScatto = document.getElementById("audioScatto");

    btn.onclick = async () => {
        btn.style.pointerEvents = "none";
        btn.style.opacity = "0.5";

        cambiaPosaRandom();

        // Countdown (impostato a 1 secondo per velocità)
        for(let i=1; i>0; i--){
            countdownEl.style.display="block";
            countdownEl.innerText=i;
            await new Promise(r=>setTimeout(r,1000));
        }
        countdownEl.style.display="none";

        // EFFETTO FLASH
        flashEl.classList.add("flash-active");
        setTimeout(() => { flashEl.classList.remove("flash-active"); }, 300);

        // EFFETTO SUONO
        try { audioScatto.play(); } catch(e) {}

        // ESECUZIONE SCATTO
        scattaFoto();
        
        btn.style.pointerEvents = "auto";
        btn.style.opacity = "1";
    };

    // --- 5. LOGICA SCATTO FOTO ---
    function scattaFoto(){
        const scene = document.querySelector("a-scene");
        const canvasAR = scene.canvas;
        const video = document.querySelector("#arjs-video") || document.querySelector("video");
        const outW = 1080; const outH = 1920;
        const canvasFinale = document.createElement("canvas");
        canvasFinale.width = outW; canvasFinale.height = outH;
        const ctx = canvasFinale.getContext("2d");

        const vW = video.videoWidth; const vH = video.videoHeight;
        const targetRatio = outW/outH; const videoRatio = vW/vH;
        let sx, sy, sw, sh;
        if(videoRatio > targetRatio){
            sw = vH * targetRatio; sh = vH; sx = (vW - sw) / 2; sy = 0;
        } else {
            sw = vW; sh = vW / targetRatio; sx = 0; sy = (vH - sh) / 2;
        }
        ctx.drawImage(video, sx, sy, sw, sh, 0, 0, outW, outH);

        scene.renderer.render(scene.object3D, scene.camera);
        const cW = canvasAR.width; const cH = canvasAR.height;
        const canvasRatio = cW/cH;
        let cx, cy, cw, ch;
        if(canvasRatio > targetRatio){
            cw = cH * targetRatio; ch = cH; cx = (cW - cw) / 2; cy = 0;
        } else {
            cw = cW; ch = cW / targetRatio; cx = 0; cy = (cH - ch) / 2;
        }
        ctx.drawImage(canvasAR, cx, cy, cw, ch, 0, 0, outW, outH);

        const link = document.createElement("a");
        link.download = "Selfie_AR_" + Date.now() + ".png";
        link.href = canvasFinale.toDataURL("image/png");
        link.click();
    }
</script>

</body>
</html>

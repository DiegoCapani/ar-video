<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Snapshot - PNG Edition</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        /* Forza lo sfondo trasparente per vedere la webcam */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: transparent !important;
        }

        /* Video webcam a tutto schermo e posizionato sotto il 3D */
        #arjs-video {
            object-fit: cover !important;
            width: 100vw !important;
            height: 100vh !important;
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            z-index: -1 !important;
        }

        /* Pulsante Scatto */
        #btn-foto {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 75px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            border: 5px solid #fff;
            z-index: 10000;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent;
        }

        #btn-foto:active { background: #ff4444; transform: translateX(-50%) scale(0.9); }

        /* Effetto Flash */
        #flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; z-index: 10001; pointer-events: none;
        }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">

    <div id="flash"></div>
    <div id="btn-foto"></div>

    <a-scene 
        embedded 
        vr-mode-ui="enabled: false"
        renderer="preserveDrawingBuffer: true; alpha: true; antialias: true; logarithmicDepthBuffer: true;"
        arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false;">

        <a-assets>
            <img id="mio-png" src="man1.png" crossorigin="anonymous">
        </a-assets>

        <a-marker type="barcode" value="1">
            <a-image 
                src="#mio-png" 
                scale="10 10 10" 
                position="0 0.1 0" 
                rotation="0 90 0"
                material="transparent: true; alphaTest: 0.5; shader: flat; side: double;">
            </a-image>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // --- FIX SCHERMO NERO ---
        // Monitora quando AR.js inietta il video e forza la trasparenza
        const observer = new MutationObserver(() => {
            const video = document.querySelector('#arjs-video');
            if (video) {
                video.style.zIndex = "-1";
                document.body.style.backgroundColor = "transparent";
            }
        });
        observer.observe(document.body, { childList: true });

        // --- LOGICA FOTO (Centrata e risoluzione nativa) ---
        document.querySelector('#btn-foto').addEventListener('click', function() {
            const scene = document.querySelector('a-scene');
            const video = document.querySelector('#arjs-video');
            const flash = document.querySelector('#flash');
            
            if (!video) return;

            // 1. Crea canvas master
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');

            // Flash visivo
            flash.style.opacity = "1";
            setTimeout(() => { flash.style.opacity = "0"; }, 100);

            // 2. Disegna Webcam
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 3. Calcolo Centratura
            const vWidth = video.videoWidth;
            const vHeight = video.videoHeight;
            const cWidth = scene.canvas.clientWidth;
            const cHeight = scene.canvas.clientHeight;
            const scale = Math.max(vWidth / cWidth, vHeight / cHeight);
            const xOffset = (vWidth - cWidth * scale) / 2;
            const yOffset = (vHeight - cHeight * scale) / 2;

            // 4. Forza rendering 3D e unisci
            scene.renderer.render(scene.object3D, scene.camera);
            ctx.drawImage(
                scene.canvas, 
                0, 0, scene.canvas.width, scene.canvas.height, 
                xOffset, yOffset, cWidth * scale, cHeight * scale
            );

            // 5. Download
            const link = document.createElement('a');
            link.download = `AR_Capture_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png').replace("image/png", "image/octet-stream");
            link.click();
        });
    </script>
</body>
</html>

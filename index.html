<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Art - Full Screen & Perfect Capture</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        /* FORZA IL FULL SCREEN TOTALE */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Questo corregge il video della webcam per riempire lo schermo senza bande nere */
        #arjs-video {
            object-fit: cover !important;
            width: 100vw !important;
            height: 100vh !important;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Pulsante Scatto */
        #btn-foto {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            border: 6px solid #fff;
            z-index: 10000;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
            -webkit-tap-highlight-color: transparent;
        }

        #btn-foto:active { background: #ff4444; transform: translateX(-50%) scale(0.9); }

        #flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; z-index: 10001; pointer-events: none;
        }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">

    <div id="flash"></div>
    <div id="btn-foto"></div>

    <a-scene 
        embedded 
        vr-mode-ui="enabled: false"
        renderer="preserveDrawingBuffer: true; antialias: true; alpha: true; logarithmicDepthBuffer: true;"
        arjs="sourceType: webcam; 
              detectionMode: mono_and_matrix; 
              matrixCodeType: 3x3; 
              debugUIEnabled: false; 
              sourceWidth:1280; sourceHeight:720; 
              displayWidth:1280; displayHeight:720;">

        <a-assets>
            <img id="mio-png" src="man1.png" crossorigin="anonymous">
        </a-assets>

        <a-marker type="barcode" value="1">
            <a-image 
                src="#mio-png" 
                scale="10 10 10" 
                position="0 0.1 0" 
                rotation="0 90 0"
                material="transparent: true; alphaTest: 0.5; shader: flat; side: double;">
            </a-image>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const btn = document.querySelector('#btn-foto');
        const flash = document.querySelector('#flash');

        // Funzione per ridimensionare correttamente AR.js al cambio orientamento
        window.addEventListener('resize', function() {
            const scene = document.querySelector('a-scene');
            scene.setAttribute('arjs', 'sourceWidth: ' + window.innerWidth + '; sourceHeight: ' + window.innerHeight + ';');
        });

        btn.addEventListener('click', function() {
            const scene = document.querySelector('a-scene');
            const video = document.querySelector('#arjs-video');
            
            if (!video) return;

            const finalCanvas = document.createElement('canvas');
            finalCanvas.width = video.videoWidth;
            finalCanvas.height = video.videoHeight;
            const ctx = finalCanvas.getContext('2d');

            flash.style.opacity = "1";
            setTimeout(() => { flash.style.opacity = "0"; }, 100);

            ctx.drawImage(video, 0, 0, finalCanvas.width, finalCanvas.height);

            const vWidth = video.videoWidth;
            const vHeight = video.videoHeight;
            const cWidth = scene.canvas.clientWidth;
            const cHeight = scene.canvas.clientHeight;

            const scale = Math.max(vWidth / cWidth, vHeight / cHeight);
            const xOffset = (vWidth - cWidth * scale) / 2;
            const yOffset = (vHeight - cHeight * scale) / 2;

            scene.renderer.render(scene.object3D, scene.camera);

            ctx.drawImage(
                scene.canvas, 
                0, 0, scene.canvas.width, scene.canvas.height, 
                xOffset, yOffset, cWidth * scale, cHeight * scale 
            );

            try {
                const dataURL = finalCanvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `AR_Art_Full_${Date.now()}.png`;
                link.href = dataURL.replace("image/png", "image/octet-stream");
                link.click();
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>
</html>
